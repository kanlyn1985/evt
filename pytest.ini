[pytest]
markers =
    unit: small isolated tests
    smoke: fast end-to-end sanity tests
    integration: uses real local knowledge base assets and can be slower
    benchmark: retrieval and answer quality regression checks
addopts = -p no:cacheprovider --basetemp=.pytest-tmp -m "not integration and not benchmark"
norecursedirs = .pytest_cache .pytest-tmp eakb_test_* test_runtime_*
